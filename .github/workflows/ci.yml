name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Format, lint, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Enforce workspace architecture guardrails
        run: cargo test -p workspace-guardrails --locked
      - run: cargo test --workspace --all-targets --locked

  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            gui: target/release/lumen-gui.exe
            cli: target/release/lumen.exe
            prism_gui: target/release/prism-gui.exe
            prism_cli: target/release/prism.exe
          - os: macos-latest
            label: macOS
            gui: target/release/lumen-gui
            cli: target/release/lumen
            prism_gui: target/release/prism-gui
            prism_cli: target/release/prism
          - os: ubuntu-latest
            label: Linux
            gui: target/release/lumen-gui
            cli: target/release/lumen
            prism_gui: target/release/prism-gui
            prism_cli: target/release/prism
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Test bundled font subset candidate and corpus
        run: cargo test -p spectrum-fonts --locked
      - run: cargo build --release --workspace --bins --locked
      - if: runner.os == 'Linux'
        run: ./target/release/lumen benchmark --strict --profile hosted-ci
      - if: runner.os == 'Linux'
        run: ./target/release/prism benchmark --strict
      - if: runner.os == 'macOS'
        run: bash scripts/package-macos.sh && bash scripts/package-prism-macos.sh
      - if: runner.os == 'Linux'
        run: bash scripts/package-linux.sh && bash scripts/package-prism-linux.sh
      - if: runner.os == 'Windows'
        run: |
          pwsh scripts/package-windows.ps1
          pwsh scripts/package-prism-windows.ps1
      - uses: actions/upload-artifact@v7
        with:
          name: spectrum-${{ matrix.label }}
          path: |
            ${{ matrix.gui }}
            ${{ matrix.cli }}
            ${{ matrix.prism_gui }}
            ${{ matrix.prism_cli }}
            target/dist/
          if-no-files-found: error
